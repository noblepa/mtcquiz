
<!DOCTYPE html>
<html>
<head>
<title>Observational Astronomy Quiz</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}
.quiz-box{
background:white;
padding:40px;
border-radius:15px;
width:500px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="quiz-box">

<h3 class="text-center mb-4">Observational Astronomy Quiz</h3>

<form action="/quiz" method="post">

<label>Student Name</label>
<input type="text" name="name" class="form-control mb-3" required>

<h5>Select CO</h5>

{% for co in cos %}
<div class="form-check">
<input class="form-check-input" type="checkbox" name="co" value="{{co}}">
<label class="form-check-label">{{co}}</label>
</div>
{% endfor %}

<h5 class="mt-3">Select Module</h5>

{% for m in modules %}
<div class="form-check">
<input class="form-check-input" type="checkbox" name="module" value="{{m}}">
<label class="form-check-label">{{m}}</label>
</div>
{% endfor %}

<h5 class="mt-3">Select Question Pattern</h5>

<div class="form-check">
<input class="form-check-input" type="radio" name="pattern" value="p1" required>
<label class="form-check-label">
Pattern 1: 10 × 1 mark + 5 × 2 mark
</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="pattern" value="p2">
<label class="form-check-label">
Pattern 2: 20 × 1 mark + 10 × 2 mark
</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="pattern" value="p3">
<label class="form-check-label">
Pattern 3: 30 × 1 mark + 15 × 2 mark
</label>
</div>

<div class="text-center mt-4">
<button class="btn btn-primary btn-lg">Start Quiz</button>
</div>

</form>
</div>

</body>
</html>
